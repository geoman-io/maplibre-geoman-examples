packages:
  - 'maplibre-geoman-*'
  - 'mapbox-geoman-*'
  # Standalone Pro demos: each has its own lockfile + .npmrc (private @geoman-io
  # registry), so they are intentionally excluded from this workspace.
  - '!maplibre-geoman-nextjs-gis-app'
  - '!maplibre-geoman-nextjs-realestate-app'
  - '!maplibre-geoman-nextjs-solar-app'
  - '!maplibre-geoman-react-editors'

allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  lmdb: true
  msgpackr-extract: true
  sharp: true
  unrs-resolver: true

# Named catalogs for cases where one app needs a different version than the rest.
catalogs:
  # eslint-config-next@16 bundles eslint-plugin-react 7.x, which is incompatible
  # with ESLint 10 (it calls the removed context.getFilename API). Pin the Next.js
  # app to the latest ESLint 9 here; every other app stays on ESLint 10 below.
  eslint9:
    eslint: ^9.39.4

# Centralized, single-source-of-truth dependency versions.
# Apps reference these via "catalog:" in their package.json.
# Bump a version here once and every example picks it up.
catalog:
  # --- Geoman (the libraries these examples showcase) ---
  '@geoman-io/maplibre-geoman-free': ^0.8.3
  '@geoman-io/mapbox-geoman-free': ^0.8.3
  maplibre-gl: ^5.24.0
  # Kept on the major that maplibre-gl@5 bundles so style-spec types stay consistent.
  '@maplibre/maplibre-gl-style-spec': ^24.8.1
  mapbox-gl: ^3.24.1

  # --- Angular ---
  '@angular/animations': ^22.0.1
  '@angular/build': ^22.0.1
  '@angular/cli': ^22.0.1
  '@angular/common': ^22.0.1
  '@angular/compiler': ^22.0.1
  '@angular/compiler-cli': ^22.0.1
  '@angular/core': ^22.0.1
  '@angular/forms': ^22.0.1
  '@angular/platform-browser': ^22.0.1
  '@angular/platform-browser-dynamic': ^22.0.1
  '@angular/router': ^22.0.1
  rxjs: ^7.8.2
  zone.js: ^0.16.2
  '@types/jasmine': ^6.0.0

  # --- React / Preact ---
  react: ^19.2.7
  react-dom: ^19.2.7
  '@types/react': ^19.2.17
  '@types/react-dom': ^19.2.3
  '@vitejs/plugin-react': ^6.0.2
  preact: ^10.29.2
  '@preact/preset-vite': ^2.10.5
  eslint-plugin-react-hooks: ^7.1.1
  eslint-plugin-react-refresh: ^0.5.3

  # --- Next.js ---
  next: ^16.2.9
  eslint-config-next: ^16.2.9
  '@tailwindcss/postcss': ^4.3.1
  tailwindcss: ^4.3.1
  postcss: ^8.5.15

  # --- Vue ---
  vue: ^3.5.38
  '@vitejs/plugin-vue': ^6.0.7
  vue-tsc: ^3.3.5
  sass-embedded: ^1.100.0

  # --- Svelte ---
  svelte: ^5.56.3
  svelte-check: ^4.6.0
  '@sveltejs/vite-plugin-svelte': ^7.1.2
  '@tsconfig/svelte': ^5.0.8

  # --- Shared tooling ---
  vite: ^8.0.16
  typescript: ~6.0.3
  sass: ^1.101.0
  tslib: ^2.8.1
  '@types/node': ^25.9.3
  eslint: ^10.5.0
  '@eslint/js': ^10.0.1
  typescript-eslint: ^8.61.1
  globals: ^17.6.0
  lodash: ^4.18.1
  '@types/lodash': ^4.17.24
  normalize.css: ^8.0.1

minimumReleaseAgeExclude:
  # Every @geoman-io/* package is our own private build — exempt the whole scope
  # so fast-moving Pro/free releases install immediately with no per-version pin.
  - '@geoman-io/*'
  - '@typescript-eslint/eslint-plugin@8.61.1'
  - '@typescript-eslint/parser@8.61.1'
  - '@typescript-eslint/project-service@8.61.1'
  - '@typescript-eslint/scope-manager@8.61.1'
  - '@typescript-eslint/tsconfig-utils@8.61.1'
  - '@typescript-eslint/type-utils@8.61.1'
  - '@typescript-eslint/types@8.61.1'
  - '@typescript-eslint/typescript-estree@8.61.1'
  - '@typescript-eslint/utils@8.61.1'
  - '@typescript-eslint/visitor-keys@8.61.1'
  - typescript-eslint@8.61.1
